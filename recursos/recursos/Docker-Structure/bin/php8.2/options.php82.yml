services:
  webserver82:
    environment:
      VIRTUAL_HOST: php82.wsdd.dock,cron82.wsdd.dock,wm82.wsdd.dock
      VIRTUAL_PORT: 80
    volumes:
      - ./dev:/var/www/html/dev
      - ./vhost:/etc/apache2/sites-enabled
      - ./php.ini:/usr/local/etc/php/php.ini
      - ./cron:/etc/cron-task
      - ./log/apache2:/var/log/apache2
      - ./log/cron:/var/log/cron