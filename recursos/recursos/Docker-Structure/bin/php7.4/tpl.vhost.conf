<VirtualHost *:80>
    ServerName {CustomUrl}
    DocumentRoot /var/www/html/{CustomUrl}{EntryPoint}
	{PROTOCOL}
    <Directory /var/www/html/{CustomUrl}>
        Options Indexes FollowSymLinks Includes ExecCGI
        AllowOverride All
        Require all granted
		Allow from all
    </Directory>
    ErrorLog /var/www/html/log/{CustomUrl}_error.log
    CustomLog /var/www/html/log/{CustomUrl}_access.log combined
</VirtualHost>