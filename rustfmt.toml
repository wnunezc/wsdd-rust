# Configuracion de formato para WSDD
# Ejecutar: cargo fmt
# Verificar (sin modificar): cargo fmt -- --check

edition = "2021"
max_width = 100
use_small_heuristics = "Default"
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
reorder_imports = true
reorder_modules = true
newline_style = "Unix"
