name: Release MSI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  windows-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install WiX Toolset
        shell: powershell
        run: choco install wixtoolset -y --no-progress

      - name: Install cargo-wix
        shell: powershell
        run: cargo install cargo-wix --version 0.3.9 --locked

      - name: Build MSI
        shell: powershell
        run: cargo wix-msi

      - name: Generate checksums
        shell: powershell
        run: |
          $msiFiles = Get-ChildItem -LiteralPath 'target/wix' -Filter *.msi
          if ($msiFiles.Count -eq 0) {
            throw 'No MSI files found in target/wix'
          }

          foreach ($file in $msiFiles) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash
            Set-Content -LiteralPath ($file.FullName + '.sha256.txt') -Value ($hash + ' *' + $file.Name)
          }

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wsdd-msi
          path: |
            target/wix/*.msi
            target/wix/*.sha256.txt

      - name: Prepare release notes
        shell: powershell
        run: |
          $tagName = "${{ github.ref_name }}"
          $version = $tagName.TrimStart('v')
          $notesPath = "docs/release/$version-draft.md"
          New-Item -ItemType Directory -Force -Path 'target' | Out-Null

          if (Test-Path -LiteralPath $notesPath) {
            Copy-Item -LiteralPath $notesPath -Destination 'target/release-notes.md' -Force
          } else {
            Set-Content -LiteralPath 'target/release-notes.md' -Value "WSDD $tagName"
          }

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: WSDD ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: target/release-notes.md
          prerelease: true
          files: |
            target/wix/*.msi
            target/wix/*.sha256.txt
